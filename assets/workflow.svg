<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07090d"/>
      <stop offset="1" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff4d4d"/>
      <stop offset="1" stop-color="#930000"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3fb950"/>
      <stop offset="1" stop-color="#1a7f37"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f0883e"/>
      <stop offset="1" stop-color="#9e4b16"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#c9d1d9"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#ff7b72"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#3fb950"/>
    </marker>
    <style>
      .title { fill:#f0f6fc; font: 800 28px "Inter", Arial, sans-serif; letter-spacing:1px; }
      .kicker { fill:#ffa5a5; font: 700 14px "Inter", Arial, sans-serif; letter-spacing:3px; }
      .node { fill:#0d1117; stroke:rgba(255,255,255,0.18); stroke-width:2; }
      .node-accent { fill:#1a1118; stroke:#ff4d4d; stroke-width:2; }
      .node-good   { fill:#0d1917; stroke:#3fb950; stroke-width:2; }
      .node-warn   { fill:#1a1510; stroke:#f0883e; stroke-width:2; }
      .label { fill:#f0f6fc; font: 700 17px "Inter", Arial, sans-serif; }
      .sub   { fill:#8b949e; font: 500 12px "Inter", monospace; }
      .edge  { stroke:#c9d1d9; stroke-width:2.5; fill:none; }
      .edge-good { stroke:#3fb950; stroke-width:2.5; fill:none; stroke-dasharray:6 4; }
      .edge-red  { stroke:#ff7b72; stroke-width:2.5; fill:none; stroke-dasharray:6 4; }
    </style>
  </defs>

  <rect width="1400" height="620" rx="28" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#fff">
    <path d="M0 124H1400"/><path d="M0 248H1400"/><path d="M0 372H1400"/><path d="M0 496H1400"/>
    <path d="M200 0V620"/><path d="M400 0V620"/><path d="M600 0V620"/><path d="M800 0V620"/><path d="M1000 0V620"/><path d="M1200 0V620"/>
  </g>

  <text x="56" y="58" class="kicker">EVIDENCE PIPELINE</text>
  <text x="56" y="96" class="title">Vector → Finding — gated, deduped, signed</text>

  <!-- Row 1: hypothesis → validate -->
  <g>
    <rect x="56"  y="176" width="200" height="92" rx="18" class="node-accent"/>
    <text x="80"  y="214" class="label">Hypothesis</text>
    <text x="80"  y="238" class="sub">vector_hypothesis</text>
    <text x="80"  y="254" class="sub">validated=false</text>

    <rect x="316" y="176" width="200" height="92" rx="18" class="node"/>
    <text x="340" y="214" class="label">Validate</text>
    <text x="340" y="238" class="sub">ExploitValidationService</text>
    <text x="340" y="254" class="sub">replay + capture proof</text>
  </g>

  <!-- Row 1 branches: validated (up/ok) vs refuted (down/bad) -->
  <g>
    <rect x="576" y="80"  width="200" height="92" rx="18" class="node-good"/>
    <text x="600" y="118" class="label">Validated</text>
    <text x="600" y="142" class="sub">validated=true</text>
    <text x="600" y="158" class="sub">proof artifacts linked</text>

    <rect x="576" y="272" width="200" height="92" rx="18" class="node-warn"/>
    <text x="600" y="310" class="label">Refuted</text>
    <text x="600" y="334" class="sub">negative_evidence Fact</text>
    <text x="600" y="350" class="sub">shadows fingerprint</text>
  </g>

  <!-- Row 2: dedup → gate -->
  <g>
    <rect x="836"  y="176" width="200" height="92" rx="18" class="node"/>
    <text x="860"  y="214" class="label">Dedup</text>
    <text x="860"  y="238" class="sub">fingerprint =</text>
    <text x="860"  y="254" class="sub">(kind,host,path,param,cwe)</text>

    <rect x="1096" y="176" width="240" height="92" rx="18" class="node-accent"/>
    <text x="1120" y="214" class="label">Promotion Gate</text>
    <text x="1120" y="238" class="sub">refuse if !validated</text>
    <text x="1120" y="254" class="sub">refuse if negative_evidence</text>
  </g>

  <!-- Row 3: draft → reviewed → terminal -->
  <g>
    <rect x="56"   y="404" width="200" height="92" rx="18" class="node"/>
    <text x="80"   y="442" class="label">Finding (draft)</text>
    <text x="80"   y="466" class="sub">promoted_at stamped</text>
    <text x="80"   y="482" class="sub">disposition=draft</text>

    <rect x="316"  y="404" width="200" height="92" rx="18" class="node"/>
    <text x="340"  y="442" class="label">Review</text>
    <text x="340"  y="466" class="sub">reviewer_user_id</text>
    <text x="340"  y="482" class="sub">reviewed_at</text>

    <rect x="576"  y="404" width="200" height="92" rx="18" class="node-good"/>
    <text x="600"  y="442" class="label">Confirmed</text>
    <text x="600"  y="466" class="sub">terminal — latched</text>

    <rect x="576"  y="512" width="200" height="80" rx="18" class="node-warn"/>
    <text x="600"  y="548" class="label">Dismissed</text>
    <text x="600"  y="572" class="sub">terminal — latched</text>

    <rect x="836"  y="404" width="200" height="92" rx="18" class="node"/>
    <text x="860"  y="442" class="label">Report</text>
    <text x="860"  y="466" class="sub">run_report.md / .html</text>
    <text x="860"  y="482" class="sub">evidence links + repro</text>

    <rect x="1096" y="404" width="240" height="92" rx="18" class="node-accent"/>
    <text x="1120" y="442" class="label">Provenance + Sign</text>
    <text x="1120" y="466" class="sub">findings.provenance.json</text>
    <text x="1120" y="482" class="sub">report.attestation.json · cosign</text>
  </g>

  <!-- Edges row 1 -->
  <g marker-end="url(#arrow)">
    <path class="edge" d="M256 222 L316 222"/>
    <path class="edge" d="M516 222 L576 150"/>
    <path class="edge" d="M516 222 L576 318"/>
    <path class="edge" d="M776 126 L836 200"/>
    <path class="edge" d="M1036 222 L1096 222"/>
  </g>

  <!-- refuted feeds back to gate as suppression signal -->
  <g marker-end="url(#arrow-red)">
    <path class="edge-red" d="M776 318 C 950 318, 1100 300, 1216 268"/>
  </g>

  <!-- gate → draft -->
  <g marker-end="url(#arrow)">
    <path class="edge" d="M1216 268 C 1216 340, 180 340, 156 404"/>
  </g>

  <!-- draft → review → confirmed/dismissed -->
  <g marker-end="url(#arrow)">
    <path class="edge" d="M256 450 L316 450"/>
    <path class="edge" d="M516 450 L576 450"/>
    <path class="edge" d="M416 496 C 416 540, 530 552, 576 552"/>
  </g>

  <!-- confirmed → report → provenance -->
  <g marker-end="url(#arrow-green)">
    <path class="edge-good" d="M776 450 L836 450"/>
  </g>
  <g marker-end="url(#arrow)">
    <path class="edge" d="M1036 450 L1096 450"/>
  </g>

  <!-- legend -->
  <g transform="translate(56 548)">
    <rect width="12" height="12" rx="2" fill="#ff4d4d"/>
    <text x="20" y="11" class="sub">gated</text>
    <rect x="82" width="12" height="12" rx="2" fill="#3fb950"/>
    <text x="102" y="11" class="sub">validated / terminal-ok</text>
    <rect x="262" width="12" height="12" rx="2" fill="#f0883e"/>
    <text x="282" y="11" class="sub">refuted / terminal-drop</text>
  </g>
</svg>
