  .t2 { fill:#c9d1d9; font: 500 15px Arial, Helvetica, sans-serif; }
</style>
</defs>
<rect width="1200" height="500" rx="28" fill="#07090d"/>
<g opacity="0.1" stroke="#fff">
<path d="M0 100H1200"/><path d="M0 200H1200"/><path d="M0 300H1200"/><path d="M0 400H1200"/>
<path d="M100 0V500"/><path d="M300 0V500"/><path d="M500 0V500"/><path d="M700 0V500"/><path d="M900 0V500"/><path d="M1100 0V500"/>
