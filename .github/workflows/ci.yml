name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest
      - name: Pytest (sqlite default)
        env:
          SECOPS_DEV_MODE: "1"
        run: |
          pytest -q \
            --deselect tests/test_vantix_chat.py \
            --deselect tests/test_dense_context.py \
            --deselect tests/test_dense_lookup.py

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: secops
          POSTGRES_PASSWORD: secops
          POSTGRES_DB: secops
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest "psycopg[binary]" alembic
      - name: Alembic upgrade head
        env:
          SECOPS_DATABASE_URL: postgresql+psycopg://secops:secops@localhost:5432/secops
        run: alembic upgrade head
      - name: Pytest (postgres)
        env:
          SECOPS_DATABASE_URL: postgresql+psycopg://secops:secops@localhost:5432/secops
          SECOPS_DEV_MODE: "1"
        run: |
          pytest -q \
            --deselect tests/test_vantix_chat.py \
            --deselect tests/test_dense_context.py \
            --deselect tests/test_dense_lookup.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vite build
