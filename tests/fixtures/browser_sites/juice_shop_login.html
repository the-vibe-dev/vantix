<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>OWASP Juice Shop - Login</title></head>
<body>
<app-root>
  <mat-card>
    <form id="login-form" novalidate>
      <mat-form-field>
        <input id="email" type="email" name="email" autocomplete="email">
      </mat-form-field>
      <mat-form-field>
        <input id="password" type="password" name="password">
      </mat-form-field>
      <button id="loginButton" type="submit">Log in</button>
    </form>
  </mat-card>
</app-root>
</body>
</html>
